<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Itens — SKZ Tracker</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
  <link rel="stylesheet" href="../css/tokens.css">
  <link rel="stylesheet" href="../css/base.css">
  <style>
    .search-bar { position: relative; margin-bottom: var(--space-3); }
    .search-bar i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 16px; color: var(--text-muted); pointer-events: none; }
    .search-bar input { width: 100%; background: var(--bg-elevated); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 10px 12px 10px 38px; font-family: var(--font-body); font-size: 14px; color: var(--text-primary); outline: none; transition: border-color var(--transition); }
    .search-bar input::placeholder { color: var(--text-faint); }
    .search-bar input:focus { border-color: var(--accent-border); }
    .filters { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: var(--space-5); position: relative; }
    .f-tag { display: inline-flex; align-items: center; gap: 5px; padding: 7px 12px; border-radius: var(--radius-pill); border: 1px solid #ccc; background: #fff; font-family: var(--font-body); font-size: 12px; color: var(--text-muted); cursor: pointer; white-space: nowrap; transition: all var(--transition); user-select: none; }
    .f-tag i { font-size: 11px; transition: transform 0.18s; }
    .f-tag.active { background: var(--lilac-light); color: var(--lilac-dark); border-color: var(--lilac-mid); }
    .f-tag.open i.chev { transform: rotate(180deg); }
    .f-dropdown { display: none; position: absolute; top: calc(100% + 6px); background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 6px; z-index: 200; min-width: 180px; box-shadow: 0 8px 24px rgba(0,0,0,0.12); }
    .f-dropdown.open { display: block; }
    .f-opt { padding: 9px 12px; border-radius: var(--radius-md); font-size: 13px; color: var(--text-muted); cursor: pointer; transition: all var(--transition); display: flex; align-items: center; justify-content: space-between; }
    .f-opt:hover { background: var(--bg-elevated); color: var(--text-primary); }
    .f-opt.selected { background: var(--lilac-light); color: var(--lilac-dark); font-weight: 500; }
    .f-opt.selected::after { content: ''; display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--lilac-dark); }
    .f-overlay { display: none; position: fixed; inset: 0; z-index: 150; }
    .f-overlay.open { display: block; }
    .group-header { display: flex; align-items: center; gap: var(--space-3); margin: var(--space-5) 0 var(--space-3); }
    .group-header-label { font-size: 11px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; white-space: nowrap; }
    .group-header-line { flex: 1; height: 1px; background: var(--border); }
    .group-header-count { font-size: 11px; color: var(--text-faint); font-family: var(--font-mono); }
    .item-card { background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: var(--space-4); display: flex; align-items: center; gap: var(--space-3); text-decoration: none; transition: border-color var(--transition); margin-bottom: var(--space-2); }
    .item-card:hover { border-color: var(--border-hover); }
    .item-card:hover .item-name { color: var(--accent); }
    .item-card.is-pending { border-left: 2px solid var(--status-pending-color); }
    .item-card.is-transit { border-left: 2px solid var(--status-transit-color); }
    .item-card.is-done    { border-left: 2px solid var(--status-done-color); }
    .item-card.is-waiting { border-left: 2px solid var(--border-hover); }
    .item-thumb { width: 44px; height: 44px; border-radius: var(--radius-sm); background: var(--bg-elevated); flex-shrink: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; color: var(--text-faint); font-size: 18px; }
    .item-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .item-body { flex: 1; min-width: 0; }
    .item-name { font-size: 13px; font-weight: 500; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 3px; transition: color var(--transition); }
    .item-meta { font-size: 11px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .item-right { flex-shrink: 0; display: flex; flex-direction: column; align-items: flex-end; gap: 5px; }
    .toggle-done { display: flex; align-items: center; justify-content: center; gap: var(--space-2); padding: var(--space-4); color: var(--text-muted); font-size: 13px; cursor: pointer; border: 1px dashed var(--border); border-radius: var(--radius-lg); transition: all var(--transition); margin-top: var(--space-3); }
    .toggle-done:hover { border-color: var(--border-hover); color: var(--text-secondary); }
    .empty-state { text-align: center; padding: 48px 16px; color: var(--text-muted); }
    .empty-state i { font-size: 32px; display: block; margin-bottom: 12px; color: var(--text-faint); }
    .empty-state p { font-size: 13px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { animation: spin 1s linear infinite; display: inline-block; }
    .fab { position: fixed; bottom: 24px; right: 24px; width: 52px; height: 52px; border-radius: 50%; background: var(--accent-deep); color: var(--bg-base); border: none; display: flex; align-items: center; justify-content: center; font-size: 22px; cursor: pointer; box-shadow: 0 4px 20px rgba(196,122,144,0.35); transition: all var(--transition); text-decoration: none; z-index: 50; }
    .fab:hover { background: var(--accent); transform: scale(1.05); }
  </style>
  <script src="../js/app.js"></script>
  <script src="../js/nav.js"></script>
</head>
<body>

  <main class="container" style="padding-top:28px; padding-bottom:100px;">
    <div style="margin-bottom:24px;">
      <h1 style="margin-bottom:4px;">Itens</h1>
      <p style="color:var(--text-muted); font-size:13px;" id="results-info">Carregando...</p>
    </div>
    <div class="search-bar">
      <i class="ti ti-search"></i>
      <input type="text" id="search-input" placeholder="Buscar por item, membro, comeback, GOM...">
    </div>
    <div class="filters" id="filters-bar">
      <div class="f-overlay" id="f-overlay" onclick="closeAllDropdowns()"></div>
      <div class="f-tag" id="tag-status" onclick="toggleDropdown('status')">
        <span id="label-status">Status</span><i class="ti ti-chevron-down chev"></i>
      </div>
      <div class="f-dropdown" id="dd-status">
        <div class="f-opt selected" onclick="selectFilter('status','','Status')">Todos os status</div>
        <div class="f-opt" onclick="selectFilter('status','pending','Pgto pendente')">Pgto pendente</div>
        <div class="f-opt" onclick="selectFilter('status','transit','Em trânsito')">Em trânsito</div>
        <div class="f-opt" onclick="selectFilter('status','waiting','Aguardando')">Aguardando</div>
        <div class="f-opt" onclick="selectFilter('status','done','Recebido')">Recebido</div>
      </div>

      <div class="f-tag" id="tag-comeback" onclick="toggleDropdown('comeback')">
        <span id="label-comeback">Comeback</span><i class="ti ti-chevron-down chev"></i>
      </div>
      <div class="f-dropdown" id="dd-comeback">
        <div class="f-opt selected" onclick="selectFilter('comeback','','Comeback')">Todos</div>
      </div>

      <div class="f-tag" id="tag-member" onclick="toggleDropdown('member')">
        <span id="label-member">Membro</span><i class="ti ti-chevron-down chev"></i>
      </div>
      <div class="f-dropdown" id="dd-member">
        <div class="f-opt selected" onclick="selectFilter('member','','Membro')">Todos</div>
      </div>

      <div class="f-tag" id="tag-community" onclick="toggleDropdown('community')">
        <span id="label-community">Comunidade</span><i class="ti ti-chevron-down chev"></i>
      </div>
      <div class="f-dropdown" id="dd-community">
        <div class="f-opt selected" onclick="selectFilter('community','','Comunidade')">Todas</div>
      </div>

      <div class="f-tag" id="tag-type" onclick="toggleDropdown('type')">
        <span id="label-type">Tipo</span><i class="ti ti-chevron-down chev"></i>
      </div>
      <div class="f-dropdown" id="dd-type">
        <div class="f-opt selected" onclick="selectFilter('type','','Tipo')">Todos</div>
      </div>
    </div>
    <div id="items-list">
      <div class="empty-state"><i class="ti ti-loader spinner"></i><p>Carregando itens...</p></div>
    </div>
  </main>

  <a href="item-form.html" class="fab" title="Novo item"><i class="ti ti-plus"></i></a>
  <script>
    let allItems = [], showDone = false;
    const filterState = { status:'', comeback:'', member:'', community:'', type:'', search:'' };

    document.addEventListener('DOMContentLoaded', async () => {
      await Auth.init();
      const restored = await Auth.tryRestore();
      if (!restored) { window.location.href = '../index.html'; return; }
      const params = new URLSearchParams(window.location.search);
      if (params.get('filter') === 'pending') setFilter('status','pending','Pgto pendente');
      if (params.get('community')) setFilter('community', decodeURIComponent(params.get('community')), decodeURIComponent(params.get('community')));
      await loadItems();
      document.getElementById('search-input').addEventListener('input', () => { filterState.search = document.getElementById('search-input').value.toLowerCase().trim(); renderList(); });
    });

    function toggleDropdown(key) {
      const isOpen = document.getElementById('dd-'+key).classList.contains('open');
      closeAllDropdowns();
      if (!isOpen) {
        document.getElementById('dd-'+key).classList.add('open');
        document.getElementById('tag-'+key).classList.add('open');
        document.getElementById('f-overlay').classList.add('open');
      }
    }

    function closeAllDropdowns() {
      document.querySelectorAll('.f-dropdown').forEach(d => d.classList.remove('open'));
      document.querySelectorAll('.f-tag').forEach(t => t.classList.remove('open'));
      document.getElementById('f-overlay').classList.remove('open');
    }

    function selectFilter(key, value, label) {
      setFilter(key, value, label);
      closeAllDropdowns();
      renderList();
    }

    function setFilter(key, value, label) {
      filterState[key] = value;
      const defaultLabels = { status:'Status', comeback:'Comeback', member:'Membro', community:'Comunidade', type:'Tipo' };
      document.getElementById('label-'+key).textContent = value ? label : defaultLabels[key];
      document.getElementById('tag-'+key).classList.toggle('active', !!value);
      // mark selected option
      document.querySelectorAll(`#dd-${key} .f-opt`).forEach(o => {
        o.classList.toggle('selected', o.textContent.trim() === label || (!value && o === document.querySelector(`#dd-${key} .f-opt`)));
      });
    }

    async function loadItems() {
      const rows = await Sheets.get(CONFIG.RANGES.ITEMS);
      if (!rows) return;
      allItems = rows.map((row, idx) => ({ row, sheetRow: idx + 4 })).filter(({ row }) => row[COL.TIPO]);
      const comebacks = [...new Set(allItems.map(i => i.row[COL.COMEBACK]).filter(Boolean))].sort();
      const communities = [...new Set(allItems.map(i => i.row[COL.COMUNIDADE]).filter(Boolean))].sort();
      const membros = ['Bang Chan','Lee Know','Changbin','Hyunjin','Han','Felix','Seungmin','I.N','OT8'];
      const tipos = ['Photocard','Álbum','Merch','Incluso de Álbum','Outro'];

      const ddCb = document.getElementById('dd-comeback');
      comebacks.forEach(v => { const d = document.createElement('div'); d.className='f-opt'; d.textContent=v; d.onclick=()=>selectFilter('comeback',v,v); ddCb.appendChild(d); });
      const ddCo = document.getElementById('dd-community');
      communities.forEach(v => { const d = document.createElement('div'); d.className='f-opt'; d.textContent=v; d.onclick=()=>selectFilter('community',v,v); ddCo.appendChild(d); });
      const ddMb = document.getElementById('dd-member');
      membros.forEach(v => { const d = document.createElement('div'); d.className='f-opt'; d.textContent=v; d.onclick=()=>selectFilter('member',v,v); ddMb.appendChild(d); });
      const ddTp = document.getElementById('dd-type');
      tipos.forEach(v => { const d = document.createElement('div'); d.className='f-opt'; d.textContent=v; d.onclick=()=>selectFilter('type',v,v); ddTp.appendChild(d); });
      renderList();
    }

    function setupFilters() {}  // mantido por compatibilidade

    function matchesFilters(row, f) {
      const cls = statusClass(row[COL.STATUS]);
      if (f.status    && cls !== f.status)                    return false;
      if (f.comeback  && row[COL.COMEBACK]  !== f.comeback)   return false;
      if (f.member    && row[COL.MEMBRO]    !== f.member)     return false;
      if (f.community && row[COL.COMUNIDADE]!== f.community)  return false;
      if (f.type      && row[COL.TIPO]      !== f.type)       return false;
      if (f.search) {
        const h = [row[COL.TIPO],row[COL.COMEBACK],row[COL.SET_POB],row[COL.MEMBRO],row[COL.COMUNIDADE],row[COL.GOM],row[COL.NUM_CLAIM],row[COL.NUM_SET]].join(' ').toLowerCase();
        if (!h.includes(f.search)) return false;
      }
      return true;
    }

    function renderList() {
      const f = filterState;
      const hasFilter = f.search || f.status || f.comeback || f.member || f.community || f.type;
      let filtered = allItems.filter(({ row }) => matchesFilters(row, f));
      const doneItems = filtered.filter(({ row }) => statusClass(row[COL.STATUS]) === 'done');
      const showing = hasFilter || showDone ? filtered : filtered.filter(({ row }) => statusClass(row[COL.STATUS]) !== 'done');
      const order = { pending:0, transit:1, waiting:2, done:3, cancelled:4 };
      showing.sort((a,b) => (order[statusClass(a.row[COL.STATUS])]||99) - (order[statusClass(b.row[COL.STATUS])]||99));

      document.getElementById('results-info').textContent = `${showing.length} ${showing.length===1?'item':'itens'}${hasFilter?' encontrados':' ativos'}`;

      if (!allItems.length) { document.getElementById('items-list').innerHTML = `<div class="empty-state"><i class="ti ti-package"></i><p>Nenhum item cadastrado ainda.<br>Adicione seu primeiro item!</p></div>`; return; }
      if (!showing.length)  { document.getElementById('items-list').innerHTML = `<div class="empty-state"><i class="ti ti-search"></i><p>Nenhum item encontrado com esses filtros.</p></div>`; return; }

      const groups = [
        { key:'pending', label:'Pgto pendente', icon:'ti-alert-triangle', color:'var(--status-pending-color)' },
        { key:'transit', label:'Em trânsito',   icon:'ti-truck',          color:'var(--status-transit-color)' },
        { key:'waiting', label:'Aguardando',    icon:'ti-clock',          color:'var(--status-waiting-color)' },
        { key:'done',    label:'Recebidos',     icon:'ti-circle-check',   color:'var(--status-done-color)'   },
      ];

      let html = '';
      groups.forEach(({ key, label, icon, color }) => {
        const g = showing.filter(({ row }) => statusClass(row[COL.STATUS]) === key);
        if (!g.length) return;
        html += `<div class="group-header"><i class="ti ${icon}" style="font-size:13px;color:${color};"></i><span class="group-header-label" style="color:${color};">${label}</span><div class="group-header-line"></div><span class="group-header-count">${g.length}</span></div>`;
        g.forEach(({ row, sheetRow }) => { html += renderCard(row, sheetRow); });
      });

      if (!hasFilter && doneItems.length > 0) {
        html += `<div class="toggle-done" onclick="toggleDone()"><i class="ti ${showDone?'ti-eye-off':'ti-eye'}"></i>${showDone?'Ocultar recebidos':'Ver '+doneItems.length+' '+(doneItems.length===1?'item recebido':'itens recebidos')}</div>`;
      }
      document.getElementById('items-list').innerHTML = html;
    }

    function renderCard(row, sheetRow) {
      const cls = statusClass(row[COL.STATUS]);
      const nome = [row[COL.TIPO],row[COL.MEMBRO],row[COL.COMEBACK],row[COL.SET_POB]].filter(Boolean).join(' · ') || 'Item sem nome';
      const meta = [row[COL.COMUNIDADE],row[COL.GOM]].filter(Boolean).join(' · ') || '—';
      const etapa = statusLabel(row[COL.ETAPA]||'');
      const pendente = parseFloat(row[COL.PENDENTE])||0;
      const img = row[COL.IMG_LINK]||'';
      return `<a class="item-card is-${cls}" href="item-detail.html?row=${sheetRow}">
        <div class="item-thumb">${img?`<img src="${img}" alt="${nome}" onerror="this.parentNode.innerHTML='<i class=\\'ti ti-photo\\'></i>'">`:'<i class="ti ti-photo"></i>'}</div>
        <div class="item-body"><div class="item-name">${nome}</div><div class="item-meta">${meta}${etapa?' · '+etapa:''}</div></div>
        <div class="item-right">
          <span class="badge badge-${cls}"><i class="ti ${statusIcon(row[COL.STATUS])}"></i>${statusLabel(row[COL.STATUS])}</span>
          ${pendente>0?`<span style="font-family:var(--font-mono);font-size:11px;color:var(--status-pending-color);">${formatBRL(pendente)}</span>`:''}
        </div>
      </a>`;
    }

    function toggleDone() { showDone = !showDone; renderList(); }
  </script>
</body>
</html>
