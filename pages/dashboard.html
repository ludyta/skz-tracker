<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Collection Tracker</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
  <link rel="stylesheet" href="../css/tokens.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/dashboard.css">
  <script src="../js/app.js"></script>
  <script src="../js/nav.js"></script>
</head>
<body>
  <main class="container" style="padding-top:32px; padding-bottom:64px;">
    <div style="margin-bottom:32px;">
      <h1 id="dash-greeting" style="margin-bottom:4px;">Minha coleção</h1>
      <p id="dash-date" style="color:var(--text-muted); font-size:13px;"></p>
    </div>
    <div id="alert-banner" style="display:none; background:var(--status-pending-bg); border:1px solid var(--status-pending-border); border-radius:var(--radius-lg); padding:14px 18px; margin-bottom:24px; display:flex; align-items:center; gap:12px;">
      <i class="ti ti-alert-triangle" style="font-size:18px; color:var(--status-pending-color); flex-shrink:0;"></i>
      <div>
        <div style="font-size:13px; font-weight:500; color:var(--status-pending-color);" id="alert-title">Pagamentos pendentes</div>
        <div style="font-size:12px; color:var(--text-muted);" id="alert-sub"></div>
      </div>
      <a href="items.html?filter=pending" class="btn btn-ghost" style="margin-left:auto; padding:5px 12px; font-size:12px;">
        Ver todos <i class="ti ti-arrow-right"></i>
      </a>
    </div>
    <div class="grid-4 mb-6" id="metric-cards">
      <div class="metric-card">
        <div class="metric-icon" style="background:var(--status-pending-bg);"><i class="ti ti-alert-triangle" style="color:var(--status-pending-color);"></i></div>
        <div class="metric-label">Pgto pendente</div>
        <div class="metric-value" id="metric-pending" style="color:var(--status-pending-color);">—</div>
      </div>
      <div class="metric-card">
        <div class="metric-icon" style="background:var(--status-transit-bg);"><i class="ti ti-truck" style="color:var(--status-transit-color);"></i></div>
        <div class="metric-label">Em trânsito</div>
        <div class="metric-value" id="metric-transit" style="color:var(--status-transit-color);">—</div>
      </div>
      <div class="metric-card">
        <div class="metric-icon" style="background:var(--status-done-bg);"><i class="ti ti-circle-check" style="color:var(--status-done-color);"></i></div>
        <div class="metric-label">Recebidos</div>
        <div class="metric-value" id="metric-done" style="color:var(--status-done-color);">—</div>
      </div>
      <div class="metric-card">
        <div class="metric-icon" style="background:var(--accent-muted);"><i class="ti ti-package" style="color:var(--accent);"></i></div>
        <div class="metric-label">Total de itens</div>
        <div class="metric-value" id="metric-total" style="color:var(--accent);">—</div>
      </div>
    </div>
    <div id="pending-value-card" class="card mb-6" style="display:flex; align-items:center; gap:16px; padding:16px 20px;">
      <i class="ti ti-coin" style="font-size:20px; color:var(--status-pending-color);"></i>
      <div>
        <div style="font-size:11px; font-weight:500; letter-spacing:0.08em; text-transform:uppercase; color:var(--text-muted); margin-bottom:3px;">Total pendente</div>
        <div id="metric-pending-value" style="font-family:var(--font-mono); font-size:22px; color:var(--status-pending-color);">R$ —</div>
      </div>
    </div>
    <div id="section-pending">
      <div class="section-header">
        <h2>Atenção imediata</h2>
        <div class="section-line"></div>
        <i class="ti ti-alert-triangle" style="font-size:14px; color:var(--status-pending-color);"></i>
      </div>
      <div id="list-pending">
        <div class="loading-state" style="text-align:center; padding:32px; color:var(--text-muted); font-size:13px;">
          <i class="ti ti-loader" style="font-size:20px; display:block; margin-bottom:8px;"></i>
          Carregando...
        </div>
      </div>
    </div>
    <div id="section-transit" class="mt-6">
      <div class="section-header">
        <h2>Em trânsito</h2>
        <div class="section-line"></div>
        <i class="ti ti-truck" style="font-size:14px; color:var(--status-transit-color);"></i>
      </div>
      <div id="list-transit"></div>
    </div>
  </main>
  <script src="../js/dashboard.js"></script>
</body>
</html>
