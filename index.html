<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Collection Tracker</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/base.css">
  <script src="js/app.js"></script>
</head>
<body>
  <div class="auth-screen">
    <div class="auth-logo">Collection <span>Tracker</span></div>
    <p class="auth-tagline">Sua coleção de kpop, organizada.</p>
    <div class="auth-card">
      <div class="auth-card-header">
        <i class="ti ti-lock" style="font-size:28px; color:var(--accent); display:block; margin-bottom:12px;"></i>
        <h2 style="font-size:18px; margin-bottom:6px;">Entrar</h2>
        <p style="font-size:13px; color:var(--text-muted); margin-bottom:24px;">
          Use sua conta Google para acessar sua coleção com segurança.
        </p>
      </div>
      <button class="btn btn-google" id="btn-signin" onclick="Auth.signIn()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Continuar com Google
      </button>
      <div class="divider"></div>
      <p style="font-size:11px; color:var(--text-faint); text-align:center; line-height:1.6;">
        Seus dados ficam na sua planilha Google Sheets.<br>
        O app não armazena nenhuma informação.
      </p>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      await Auth.init();
      // If already logged in, go straight to dashboard
      const restored = await Auth.tryRestore();
      if (restored) {
        window.location.href = 'pages/dashboard.html';
        return;
      }
      // Listen for sign in
      document.addEventListener('auth:signin', () => {
        window.location.href = 'pages/dashboard.html';
      });
    });
  </script>
</body>
</html>
