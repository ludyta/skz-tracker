<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Item — SKZ Tracker</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
  <link rel="stylesheet" href="../css/tokens.css">
  <link rel="stylesheet" href="../css/base.css">
  <style>
    .back-btn { display:inline-flex; align-items:center; gap:6px; color:var(--text-muted); font-size:13px; text-decoration:none; margin-bottom:20px; transition:color var(--transition); }
    .back-btn:hover { color:var(--text-primary); }
    .item-hero { background:var(--bg-surface); border:1px solid var(--border); border-radius:var(--radius-lg); padding:var(--space-5); display:flex; gap:var(--space-5); margin-bottom:var(--space-4); }
    .hero-img { width:90px; height:90px; border-radius:var(--radius-md); background:var(--bg-elevated); flex-shrink:0; overflow:hidden; display:flex; align-items:center; justify-content:center; color:var(--text-faint); font-size:28px; }
    .hero-img img { width:100%; height:100%; object-fit:cover; }
    .hero-body { flex:1; min-width:0; }
    .hero-name { font-family:var(--font-display); font-size:18px; font-weight:500; color:var(--text-primary); margin-bottom:4px; line-height:1.3; }
    .hero-meta { font-size:12px; color:var(--text-muted); margin-bottom:6px; }
    .hero-etapa { font-size:11px; color:var(--text-secondary); margin-bottom:8px; display:flex; align-items:center; gap:4px; }
    .section-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:var(--space-3); }
    .section-title { font-size:11px; font-weight:500; letter-spacing:0.08em; text-transform:uppercase; color:var(--text-muted); display:flex; align-items:center; gap:var(--space-2); flex:1; }
    .section-title::after { content:''; flex:1; height:1px; background:var(--border); margin-left:var(--space-2); }
    .edit-toggle-btn { display:inline-flex; align-items:center; gap:5px; font-size:11px; color:var(--text-muted); padding:4px 10px; border:1px solid var(--border); border-radius:var(--radius-pill); background:transparent; cursor:pointer; transition:all var(--transition); flex-shrink:0; margin-left:8px; }
    .edit-toggle-btn:hover, .edit-toggle-btn.active { border-color:var(--accent-border); color:var(--lilac-dark); background:var(--lilac-light); }
    .cx-info-box { background:var(--lilac-light); border:1px solid var(--lilac-mid); border-radius:var(--radius-md); padding:12px 14px; margin-bottom:var(--space-3); }
    .cx-info-label { font-family:var(--font-label); font-size:9px; font-weight:700; letter-spacing:0.09em; text-transform:uppercase; color:var(--lilac-dark); margin-bottom:10px; }
    .info-grid { display:grid; grid-template-columns:1fr 1fr; gap:var(--space-2); margin-bottom:var(--space-2); }
    .info-card { background:var(--bg-surface); border:1px solid var(--border); border-radius:var(--radius-md); padding:var(--space-3) var(--space-4); transition:border-color var(--transition); }
    .info-card.full { grid-column:1/-1; }
    .info-card.editing { border-color:var(--accent-border); background:var(--bg-base); }
    .info-label { font-size:10px; font-weight:500; letter-spacing:0.08em; text-transform:uppercase; color:var(--text-faint); margin-bottom:4px; }
    .info-value { font-size:13px; color:var(--text-primary); }
    .info-value a { color:var(--accent); text-decoration:none; }
    .info-input { width:100%; background:transparent; border:none; border-bottom:1px solid var(--accent-border); padding:2px 0; font-family:var(--font-body); font-size:13px; color:var(--text-primary); outline:none; -webkit-appearance:none; }
    .info-input::placeholder { color:var(--text-faint); }
    .info-select { width:100%; background:transparent; border:none; border-bottom:1px solid var(--accent-border); padding:2px 0; font-family:var(--font-body); font-size:13px; color:var(--text-primary); outline:none; -webkit-appearance:none; cursor:pointer; }
    .cx-info-box .info-card { background:#fff; border-color:var(--lilac-mid); }
    .cx-info-box .info-card.editing { border-color:var(--lilac-dark); }
    .save-actions { display:flex; gap:8px; margin-top:var(--space-3); margin-bottom:var(--space-4); }
    .payment-step { background:var(--bg-surface); border:1px solid var(--border); border-radius:var(--radius-md); padding:var(--space-4); margin-bottom:var(--space-2); display:flex; align-items:center; gap:var(--space-3); transition:border-color var(--transition); }
    .payment-step.editing { border-color:var(--accent-border); }
    .step-icon { width:32px; height:32px; border-radius:var(--radius-sm); display:flex; align-items:center; justify-content:center; font-size:15px; flex-shrink:0; }
    .step-body { flex:1; min-width:0; }
    .step-name { font-size:13px; font-weight:500; color:var(--text-primary); margin-bottom:2px; }
    .step-value { font-size:12px; color:var(--text-muted); }
    .step-value-input { width:80px; background:transparent; border:none; border-bottom:1px solid var(--accent-border); padding:2px 0; font-family:var(--font-body); font-size:12px; color:var(--text-primary); outline:none; }
    .step-date { font-size:10px; color:var(--text-faint); margin-top:2px; }
    .step-date.atrasado { color:var(--status-cancelled-color); font-weight:500; }
    .step-date-input { width:100%; background:transparent; border:none; border-bottom:1px solid var(--accent-border); padding:2px 0; font-family:var(--font-body); font-size:11px; color:var(--text-muted); outline:none; margin-top:3px; }
    .step-right { display:flex; flex-direction:column; align-items:flex-end; gap:4px; flex-shrink:0; }
    .step-right select { background:var(--bg-elevated); border:1px solid var(--border); border-radius:var(--radius-md); padding:5px 10px; font-family:var(--font-body); font-size:11px; color:var(--text-secondary); outline:none; cursor:pointer; -webkit-appearance:none; }
    .pay-alert { display:inline-flex; align-items:center; gap:4px; font-size:10px; padding:2px 8px; border-radius:var(--radius-pill); font-family:var(--font-label); font-weight:700; letter-spacing:0.05em; }
    .pay-alert.pendente { background:var(--status-pending-bg); color:var(--status-pending-color); border:1px solid var(--status-pending-border); }
    .pay-alert.atrasado { background:var(--status-cancelled-bg); color:var(--status-cancelled-color); border:1px solid var(--status-cancelled-border); }
    .totals-card { background:var(--bg-surface); border:1px solid var(--border); border-radius:var(--radius-lg); padding:var(--space-5); margin-top:var(--space-4); display:flex; gap:var(--space-5); }
    .total-item { flex:1; text-align:center; }
    .total-label { font-size:10px; font-weight:500; letter-spacing:0.08em; text-transform:uppercase; color:var(--text-faint); margin-bottom:6px; }
    .total-value { font-family:var(--font-mono); font-size:20px; }
    .danger-zone { background:var(--status-cancelled-bg); border:1px solid var(--status-cancelled-border); border-radius:var(--radius-lg); padding:var(--space-4); margin-top:var(--space-5); display:flex; align-items:center; justify-content:space-between; gap:var(--space-4); }
    .danger-text p { font-size:13px; font-weight:500; color:var(--status-cancelled-color); margin-bottom:2px; }
    .danger-text span { font-size:11px; color:var(--text-muted); }
    @keyframes spin { to { transform:rotate(360deg); } }
    .spinner { animation:spin 1s linear infinite; display:inline-block; }
    @media (max-width:640px) { .item-hero { flex-direction:column; } .info-grid { grid-template-columns:1fr; } }
  </style>
  <script src="../js/app.js"></script>
  <script src="../js/nav.js"></script>
</head>
<body>
  <main class="container" style="padding-top:24px; padding-bottom:60px;">
    <a href="items.html" class="back-btn"><i class="ti ti-arrow-left"></i> Voltar para itens</a>
    <div id="content">
      <div style="text-align:center; padding:48px; color:var(--text-muted);">
        <i class="ti ti-loader spinner" style="font-size:28px; display:block; margin-bottom:12px;"></i>
        Carregando...
      </div>
    </div>
  </main>
  <script>
    let rowData = [], sheetRow = 0;
    let comunidadesData = [], listasData = {};
    let editingInfo = false, editingPay = false;

    const ST_OPTIONS = ['Aguardando cobrança','Cobrado — pendente','Pago'];
    const PAY_STEPS = [
      { name:'Item',           vl:COL.VL_ITEM, st:COL.ST_ITEM, dt:COL.DT_ITEM },
      { name:'Frete inter 1',  vl:COL.VL_FI1,  st:COL.ST_FI1,  dt:COL.DT_FI1  },
      { name:'Frete inter 2',  vl:COL.VL_FI2,  st:COL.ST_FI2,  dt:COL.DT_FI2  },
      { name:'Alfândega',      vl:COL.VL_ALF,  st:COL.ST_ALF,  dt:COL.DT_ALF  },
      { name:'Frete nacional', vl:COL.VL_FNAC, st:COL.ST_FNAC, dt:COL.DT_FNAC },
    ];
    const STEP_CLS  = { 'Aguardando cobrança':'waiting','Cobrado — pendente':'pending','Pago':'done','Atrasado':'cancelled' };
    const STEP_ICON = { waiting:'ti-clock', pending:'ti-alert-triangle', done:'ti-circle-check', cancelled:'ti-alert-circle' };

    document.addEventListener('DOMContentLoaded', async () => {
      try {
        await Auth.init();
        const restored = await Auth.tryRestore();
        if (!restored) { window.location.href = '../index.html'; return; }
        const params = new URLSearchParams(window.location.search);
        sheetRow = parseInt(params.get('row'));
        if (!sheetRow) { window.location.href = 'items.html'; return; }
        const [commRows, listRows] = await Promise.all([
          Sheets.get(CONFIG.RANGES.COMMUNITIES),
          Sheets.get('Listas!A3:D100'),
        ]);
        comunidadesData = (commRows||[]).filter(r=>r[0]).map(r=>({
          nome:r[0], goms:(r[1]||'').split('|').map(g=>g.trim()).filter(Boolean), linkCeg:r[3]||'',
        }));
        listasData.tipos     = [...new Set((listRows||[]).map(r=>r[0]).filter(Boolean))];
        listasData.comebacks = [...new Set((listRows||[]).map(r=>r[1]).filter(Boolean))];
        listasData.membros   = [...new Set((listRows||[]).map(r=>r[2]).filter(Boolean))];
        listasData.plats     = [...new Set((listRows||[]).map(r=>r[3]).filter(v=>v&&v.trim()))];
        await loadItem();
      } catch(e) {
        document.getElementById('content').innerHTML = `
          <div style="text-align:center;padding:32px;color:var(--text-muted);">
            <i class="ti ti-wifi-off" style="font-size:28px;display:block;margin-bottom:12px;"></i>
            <p style="margin-bottom:16px;">Erro ao carregar: ${e.message}</p>
            <a href="../index.html" class="btn btn-primary" style="justify-content:center;">Fazer login novamente</a>
          </div>`;
      }
    });

    async function loadItem() {
      try {
        const rows = await Sheets.get(`Itens!A${sheetRow}:AL${sheetRow}`);
        if (!rows||!rows[0]||!rows[0].some(v=>v)) {
          document.getElementById('content').innerHTML='<p style="color:var(--text-muted);text-align:center;padding:32px;">Item não encontrado.</p>';
          return;
        }
        rowData = rows[0];
        while (rowData.length < 38) rowData.push('');
        editingInfo = false; editingPay = false;
        render();
      } catch(e) {
        document.getElementById('content').innerHTML=`
          <div style="text-align:center;padding:32px;color:var(--text-muted);">
            <p style="margin-bottom:16px;">Erro: ${e.message}</p>
            <button class="btn btn-ghost" onclick="loadItem()">Tentar novamente</button>
          </div>`;
      }
    }

    function isCx() { return (rowData[COL.TIPO_CEG]||'')==='Caixinha'; }
    function selOpts(arr, val) { return arr.map(v=>`<option value="${v}" ${v===val?'selected':''}>${v}</option>`).join(''); }

    function render() {
      const r = rowData, cx = isCx();
      const img=r[COL.IMG_LINK]||'', tipo=r[COL.TIPO]||'', membro=r[COL.MEMBRO]||'';
      const comeback=r[COL.COMEBACK]||'', set=r[COL.SET_POB]||'';
      const numSet=r[COL.NUM_SET]||'', numClaim=r[COL.NUM_CLAIM]||'';
      const comunidade=r[COL.COMUNIDADE]||'', gom=r[COL.GOM]||'', ceg=r[COL.CEG]||'';
      const linkCeg=r[COL.LINK_CEG]||'', dataClaim=r[COL.DATA_CLAIM]||'', dataRec=r[COL.DATA_REC]||'';
      const plat=r[COL.PLATAFORMA]||'', mes=r[COL.MES_EDICAO]||'';
      const linhaGom=r[COL.LINHA_GOM]||'', nomeset=r[COL.NOME_SET]||'';
      const etapa=r[COL.ETAPA]||'', notas=r[COL.NOTAS]||'';
      const pendente=parseFloat(r[COL.PENDENTE])||0, pago=parseFloat(r[COL.TOTAL_PAGO])||0;
      const nome=[tipo,membro,comeback,set].filter(Boolean).join(' · ')||'Item sem nome';
      const heroMeta=cx?[comunidade,gom,plat].filter(Boolean):[comunidade,gom].filter(Boolean);

      // Status geral de pagamento
      const issues = paymentSummary(r);
      const hasAtrasado = issues.some(i=>i.status==='Atrasado');
      const hasPendente = issues.some(i=>i.status==='Cobrado — pendente');
      let payBadgeHtml = '';
      if (hasAtrasado) {
        const tot = issues.filter(i=>i.status==='Atrasado').reduce((a,i)=>a+i.valor,0);
        payBadgeHtml = `<span class="pay-alert atrasado"><i class="ti ti-alert-circle" style="font-size:10px;"></i> ${issues.filter(i=>i.status==='Atrasado').map(i=>i.name).join(', ')} — ATRASADO · ${formatBRL(tot)}</span>`;
      } else if (hasPendente) {
        const tot = issues.filter(i=>i.status==='Cobrado — pendente').reduce((a,i)=>a+i.valor,0);
        const nomes = issues.filter(i=>i.status==='Cobrado — pendente').map(i=>i.name);
        payBadgeHtml = `<span class="pay-alert pendente"><i class="ti ti-alert-triangle" style="font-size:10px;"></i> ${nomes.length>1?nomes.length+' pendentes':nomes[0]+' pendente'} · ${formatBRL(tot)}</span>`;
      }

      const comm = comunidadesData.find(c=>c.nome===comunidade);
      const gomOpts = (comm?.goms||[]).map(g=>`<option ${g===gom?'selected':''}>${g}</option>`).join('');

      function infoCard(label, viewVal, editEl, full=false) {
        return `<div class="info-card${full?' full':''}${editingInfo?' editing':''}">
          <div class="info-label">${label}</div>
          ${editingInfo ? editEl : `<div class="info-value">${viewVal||'—'}</div>`}
        </div>`;
      }

      const cxBoxHtml = cx ? `<div class="cx-info-box">
        <div class="cx-info-label">Caixinha ${plat}</div>
        <div class="info-grid" style="margin-bottom:0;">
          ${infoCard('Plataforma',plat,`<select class="info-select" id="e-plat"><option value="">Selecione...</option>${selOpts(listasData.plats||[],plat)}</select>`)}
          ${infoCard('Mês/edição',mes?formatMesAno(mes):'—',`<input class="info-input" type="month" id="e-mes" value="${mes}">`)}
          ${infoCard('Nome do set',nomeset,`<input class="info-input" id="e-nomeset" value="${nomeset}" placeholder="ex: Set Changbinas">`)}
          ${infoCard('Linha GOM',linhaGom,`<input class="info-input" id="e-linha-gom" value="${linhaGom}" placeholder="ex: 657">`)}
        </div>
      </div>` : '';

      const stepsHtml = PAY_STEPS.map(step => {
        const val = r[step.vl]||'', st = r[step.st]||'Aguardando cobrança', dt = r[step.dt]||'';
        const realSt = calcPayStatus(st, dt);
        const cls  = STEP_CLS[realSt]||'waiting';
        const icon = STEP_ICON[cls]||'ti-clock';
        const opts = ST_OPTIONS.map(o=>`<option value="${o}" ${o===st?'selected':''}>${o}</option>`).join('');
        let dateHtml = '';
        if (editingPay) {
          dateHtml = `<input class="step-date-input" type="date" data-dt="${step.dt}" value="${dt}" placeholder="Data limite">`;
        } else if (dt) {
          const isAtrasado = realSt==='Atrasado';
          dateHtml = `<div class="step-date${isAtrasado?' atrasado':''}">Prazo: ${dt}${isAtrasado?' — ATRASADO':''}</div>`;
        }
        return `<div class="payment-step${editingPay?' editing':''}">
          <div class="step-icon" style="background:var(--status-${cls}-bg);"><i class="ti ${icon}" style="color:var(--status-${cls}-color);"></i></div>
          <div class="step-body">
            <div class="step-name">${step.name}</div>
            ${editingPay
              ? `<input class="step-value-input" type="number" data-vl="${step.vl}" value="${val}" placeholder="0,00" step="0.01" min="0">`
              : `<div class="step-value">${val?formatBRL(val):'—'}</div>`}
            ${dateHtml}
          </div>
          <div class="step-right">
            <select data-st="${step.st}">${opts}</select>
          </div>
        </div>`;
      }).join('');

      const saveInfoBtns = editingInfo ? `<div class="save-actions">
        <button class="btn btn-ghost" style="flex:1;justify-content:center;" onclick="cancelInfo()">Cancelar</button>
        <button class="btn btn-primary" style="flex:2;justify-content:center;" onclick="saveInfo()" id="save-info-btn"><i class="ti ti-check"></i> Salvar informações</button>
      </div>` : '';

      const savePayBtns = editingPay ? `<div class="save-actions">
        <button class="btn btn-ghost" style="flex:1;justify-content:center;" onclick="cancelPay()">Cancelar</button>
        <button class="btn btn-primary" style="flex:2;justify-content:center;" onclick="savePay()" id="save-pay-btn"><i class="ti ti-check"></i> Salvar pagamentos</button>
      </div>` : '';

      document.getElementById('content').innerHTML = `
        <div class="item-hero">
          <div class="hero-img">${img?`<img src="${img}" alt="${nome}" onerror="this.parentNode.innerHTML='<i class=\\'ti ti-photo\\'></i>'">`:'<i class="ti ti-photo"></i>'}</div>
          <div class="hero-body">
            <div class="hero-name">${nome}</div>
            <div class="hero-meta">${heroMeta.join(' · ')||'—'}</div>
            ${etapa?`<div class="hero-etapa"><i class="ti ti-truck" style="font-size:12px;color:var(--lilac-dark);"></i> ${etapa}</div>`:''}
            ${payBadgeHtml}
          </div>
        </div>

        <div class="section-header">
          <div class="section-title">Informações</div>
          <button class="edit-toggle-btn${editingInfo?' active':''}" onclick="toggleInfo()">
            <i class="ti ti-pencil" style="font-size:12px;"></i> ${editingInfo?'Editando...':'Editar'}
          </button>
        </div>

        ${cxBoxHtml}

        <div class="info-grid">
          ${infoCard('Tipo',tipo,`<select class="info-select" id="e-tipo"><option value="">Selecione...</option>${selOpts(listasData.tipos||[],tipo)}</select>`)}
          ${infoCard('Membro',membro,`<select class="info-select" id="e-membro"><option value="">Selecione...</option>${selOpts(listasData.membros||[],membro)}</select>`)}
          ${infoCard('Comeback',comeback,`<select class="info-select" id="e-comeback"><option value="">Selecione...</option>${selOpts(listasData.comebacks||[],comeback)}</select>`)}
          ${infoCard('Set / POB',set+(numSet?` · Set ${numSet}`:''),`<input class="info-input" id="e-set" value="${set}" placeholder="ex: Makestar POB">`)}
          ${infoCard('Nº do set',numSet,`<input class="info-input" type="number" id="e-numset" value="${numSet}">`)}
          ${infoCard('Nº do claim',numClaim,`<input class="info-input" type="number" id="e-numclaim" value="${numClaim}">`)}
          ${infoCard('CEG',ceg,`<input class="info-input" id="e-ceg" value="${ceg}" placeholder="ex: CEG Karma POBs">`)}
          ${infoCard('Comunidade',comunidade,`<select class="info-select" id="e-comunidade" onchange="updateEditGom(this.value)"><option value="">Selecione...</option>${selOpts(comunidadesData.map(c=>c.nome),comunidade)}</select>`)}
          ${infoCard('GOM',gom,`<select class="info-select" id="e-gom"><option value="">Selecione...</option>${gomOpts}</select>`)}
          ${infoCard('Data do claim',dataClaim,`<input class="info-input" type="date" id="e-data-claim" value="${dataClaim}">`)}
          ${infoCard('Data recebimento',dataRec,`<input class="info-input" type="date" id="e-data-rec" value="${dataRec}">`)}
          ${infoCard('Etapa de trânsito',etapa,`<select class="info-select" id="e-etapa"><option value="">—</option>${ETAPAS.map(e=>`<option ${e===etapa?'selected':''}>${e}</option>`).join('')}</select>`,true)}
          ${infoCard('Notas',notas,`<input class="info-input" id="e-notas" value="${notas}" placeholder="Observações...">`,true)}
          ${infoCard('Link da imagem',img?`<a href="${img}" target="_blank">Ver imagem <i class="ti ti-external-link" style="font-size:11px;"></i></a>`:null,`<input class="info-input" type="url" id="e-img" value="${img}" placeholder="https://...">`,true)}
          ${linkCeg?infoCard('Planilha da CEG',`<a href="${linkCeg}" target="_blank">Abrir <i class="ti ti-external-link" style="font-size:11px;"></i></a>`,`<input class="info-input" type="url" id="e-link-ceg" value="${linkCeg}" placeholder="https://...">`,true):''}
        </div>
        ${saveInfoBtns}

        <div class="section-header">
          <div class="section-title">Pagamentos</div>
          <button class="edit-toggle-btn${editingPay?' active':''}" onclick="togglePay()">
            <i class="ti ti-pencil" style="font-size:12px;"></i> ${editingPay?'Editando...':'Editar'}
          </button>
        </div>
        ${stepsHtml}
        ${savePayBtns}

        <div class="totals-card">
          <div class="total-item"><div class="total-label">Total pago</div><div class="total-value" style="color:var(--status-done-color);">${formatBRL(pago)}</div></div>
          <div style="width:1px;background:var(--border);"></div>
          <div class="total-item"><div class="total-label">Pendente</div><div class="total-value" style="color:${pendente>0?'var(--status-pending-color)':'var(--text-muted)'};">${formatBRL(pendente)}</div></div>
        </div>

        <div class="danger-zone">
          <div class="danger-text"><p>Remover item</p><span>Esta ação não pode ser desfeita.</span></div>
          <button class="btn btn-danger" onclick="deleteItem()"><i class="ti ti-trash"></i> Remover</button>
        </div>`;
    }

    function toggleInfo() { editingInfo=!editingInfo; if(editingInfo) editingPay=false; render(); setTimeout(()=>document.querySelector('.info-grid')?.scrollIntoView({behavior:'smooth',block:'start'}),100); }
    function cancelInfo() { editingInfo=false; render(); }
    function togglePay()  { editingPay=!editingPay;   if(editingPay)  editingInfo=false; render(); setTimeout(()=>document.querySelector('.payment-step')?.scrollIntoView({behavior:'smooth',block:'start'}),100); }
    function cancelPay()  { editingPay=false; render(); }

    function updateEditGom(nome) {
      const sel=document.getElementById('e-gom'); if(!sel) return;
      const comm=comunidadesData.find(c=>c.nome===nome);
      sel.innerHTML=`<option value="">Selecione...</option>`+(comm?.goms||[]).map(g=>`<option>${g}</option>`).join('');
    }

    async function saveInfo() {
      const btn=document.getElementById('save-info-btn');
      btn.innerHTML='<i class="ti ti-loader spinner"></i> Salvando...'; btn.disabled=true;
      const g=id=>document.getElementById(id)?.value||'';
      const cx=isCx();
      const newRow=[
        g('e-tipo'),g('e-membro'),g('e-comeback'),g('e-set'),g('e-numset'),g('e-numclaim'),g('e-img'),
        rowData[COL.TIPO_CEG]||'',
        cx?g('e-plat'):rowData[COL.PLATAFORMA]||'',
        cx?g('e-mes'):rowData[COL.MES_EDICAO]||'',
        cx?g('e-nomeset'):rowData[COL.NOME_SET]||'',
        cx?g('e-linha-gom'):rowData[COL.LINHA_GOM]||'',
        g('e-comunidade'),g('e-gom'),g('e-ceg'),g('e-link-ceg')||rowData[COL.LINK_CEG]||'',g('e-data-claim'),
        g('e-etapa'),g('e-data-rec'),g('e-notas'),
        rowData[COL.VL_ITEM]||'',rowData[COL.ST_ITEM]||'',rowData[COL.DT_ITEM]||'',
        rowData[COL.VL_FI1]||'',rowData[COL.ST_FI1]||'',rowData[COL.DT_FI1]||'',
        rowData[COL.VL_FI2]||'',rowData[COL.ST_FI2]||'',rowData[COL.DT_FI2]||'',
        rowData[COL.VL_ALF]||'',rowData[COL.ST_ALF]||'',rowData[COL.DT_ALF]||'',
        rowData[COL.VL_FNAC]||'',rowData[COL.ST_FNAC]||'',rowData[COL.DT_FNAC]||'',
        rowData[COL.TOTAL_PAGO]||'',rowData[COL.PENDENTE]||'',rowData[COL.STATUS]||'',
      ];
      try { await Sheets.set(`Itens!A${sheetRow}:AL${sheetRow}`,[newRow]); await loadItem(); }
      catch(e) { alert('Erro ao salvar.'); btn.innerHTML='<i class="ti ti-check"></i> Salvar informações'; btn.disabled=false; }
    }

    async function savePay() {
      const btn=document.getElementById('save-pay-btn');
      btn.innerHTML='<i class="ti ti-loader spinner"></i> Salvando...'; btn.disabled=true;
      const vals={}, sts={}, dts={};
      document.querySelectorAll('[data-vl]').forEach(el=>{ vals[parseInt(el.dataset.vl)]=el.value; });
      document.querySelectorAll('[data-st]').forEach(el=>{ sts[parseInt(el.dataset.st)]=el.value; });
      document.querySelectorAll('[data-dt]').forEach(el=>{ dts[parseInt(el.dataset.dt)]=el.value; });

      const calcSteps=[
        {vl:COL.VL_ITEM,st:COL.ST_ITEM,dt:COL.DT_ITEM},
        {vl:COL.VL_FI1, st:COL.ST_FI1, dt:COL.DT_FI1 },
        {vl:COL.VL_FI2, st:COL.ST_FI2, dt:COL.DT_FI2 },
        {vl:COL.VL_ALF, st:COL.ST_ALF, dt:COL.DT_ALF },
        {vl:COL.VL_FNAC,st:COL.ST_FNAC,dt:COL.DT_FNAC},
      ];
      let totalPago=0, totalPend=0;
      const stVals=[];
      calcSteps.forEach(({vl,st,dt})=>{
        const v=parseFloat(vals[vl]??rowData[vl])||0;
        const s=sts[st]??rowData[st]??'';
        const d=dts[dt]??rowData[dt]??'';
        const real=calcPayStatus(s,d);
        if(s==='Pago') totalPago+=v;
        if(s==='Cobrado — pendente') totalPend+=v;
        stVals.push(s);
      });
      const novoStatus=stVals.includes('Cobrado — pendente')?'Cobrado — pendente'
                      :stVals.every(s=>s==='Pago')?'Pago':'Aguardando cobrança';

      const newRow=[
        rowData[COL.TIPO]||'',rowData[COL.MEMBRO]||'',rowData[COL.COMEBACK]||'',
        rowData[COL.SET_POB]||'',rowData[COL.NUM_SET]||'',rowData[COL.NUM_CLAIM]||'',rowData[COL.IMG_LINK]||'',
        rowData[COL.TIPO_CEG]||'',rowData[COL.PLATAFORMA]||'',rowData[COL.MES_EDICAO]||'',
        rowData[COL.NOME_SET]||'',rowData[COL.LINHA_GOM]||'',
        rowData[COL.COMUNIDADE]||'',rowData[COL.GOM]||'',rowData[COL.CEG]||'',
        rowData[COL.LINK_CEG]||'',rowData[COL.DATA_CLAIM]||'',
        rowData[COL.ETAPA]||'',rowData[COL.DATA_REC]||'',rowData[COL.NOTAS]||'',
        (vals[COL.VL_ITEM]??rowData[COL.VL_ITEM])||'', sts[COL.ST_ITEM]||'', (dts[COL.DT_ITEM]??rowData[COL.DT_ITEM])||'',
        (vals[COL.VL_FI1]??rowData[COL.VL_FI1])||'',  sts[COL.ST_FI1]||'',  (dts[COL.DT_FI1]??rowData[COL.DT_FI1])||'',
        (vals[COL.VL_FI2]??rowData[COL.VL_FI2])||'',  sts[COL.ST_FI2]||'',  (dts[COL.DT_FI2]??rowData[COL.DT_FI2])||'',
        (vals[COL.VL_ALF]??rowData[COL.VL_ALF])||'',  sts[COL.ST_ALF]||'',  (dts[COL.DT_ALF]??rowData[COL.DT_ALF])||'',
        (vals[COL.VL_FNAC]??rowData[COL.VL_FNAC])||'',sts[COL.ST_FNAC]||'', (dts[COL.DT_FNAC]??rowData[COL.DT_FNAC])||'',
        totalPago.toString(),totalPend.toString(),novoStatus,
      ];
      try { await Sheets.set(`Itens!A${sheetRow}:AL${sheetRow}`,[newRow]); await loadItem(); }
      catch(e) { alert('Erro ao salvar.'); btn.innerHTML='<i class="ti ti-check"></i> Salvar pagamentos'; btn.disabled=false; }
    }

    async function deleteItem() {
      if(!confirm('Remover este item? Esta ação não pode ser desfeita.')) return;
      try { await Sheets.set(`Itens!A${sheetRow}:AL${sheetRow}`,[Array(38).fill('')]); window.location.href='items.html'; }
      catch(e) { alert('Erro ao remover.'); }
    }
  </script>
</body>
</html>
